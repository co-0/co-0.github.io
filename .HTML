<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث المباشر</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية زرقاء داكنة مع تأثير بلور */
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        /* تأثير التصميم الزجاجي البلور الفاخر للشريط العلوي */
        .header-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(30, 58, 138, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .left-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .control-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        .control-btn:hover {
            opacity: 0.9;
        }
        .adblock-link {
            background-color: #dc2626;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }
        .adblock-link:hover {
            background-color: #b91c1c;
        }
        .server-note {
            text-align: center;
            margin-bottom: 15px;
            color: #93c5fd;
            font-size: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="server-note">"سيتم توقيف البث المباشر بعد انتهاء المباريات ب 30 دقيقه بسبب توفير الوقت للسيرفر"</div>

    <div class="header-container">
        <h1 style="font-size: 18px; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">📺 قناة البث الرئيسية</h1>
        
        <!-- الأزرار المتبقية: زر التكبير وزر مانع الإعلانات فقط دون زر الترسيت -->
        <div class="left-buttons">
            <button class="control-btn" onclick="triggerFullscreen()">🔲 تكبير الشاشة</button>
            <a href="https://getadblock.com" target="_blank" class="adblock-link">🛡️ تحميل AdBlock</a>
        </div>
    </div>

    <!-- كود المشغل الخاص بك الأصلي تماماً دون تغيير أي حرف -->
    <iframe allow="autoplay; encrypted-media" allowfullscreen="true" class="" height="620px" id="streamFrame" rameborder="0" src="https://live.bb6.dpdns.org/albaplayer/ch1/?serv=0" width="100%"></iframe>

    <script>
        // كود تكبير الشاشة الآمن عبر المتصفح
        function triggerFullscreen() {
            const iframe = document.getElementById('streamFrame');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.mozRequestFullScreen) {
                iframe.mozRequestFullScreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            }
        }
    </script>

</body>
</html>
