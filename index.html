<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="docTitle">بوابة التوظيف والدعم المتكاملة</title>
    <style>
        :root {
            --primary: #3ecf8e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f3f4f6;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --bg-grad-3: #311042;
            --title-size: 1.8rem;
            --sub-size: 0.95rem;
            --btn-size: 1.05rem;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, var(--bg-grad-3) 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color); margin: 0; padding: 20px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .settings-bar {
            display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px; border-radius: 12px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px); flex-wrap: wrap; justify-content: center;
        }
        .settings-btn {
            background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
            color: #fff; padding: 8px 16px; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-size: 0.85rem; transition: all 0.3s;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--primary); }
        .settings-btn.active { background: var(--primary); color: #0f172a; }
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 40px;
            max-width: 550px; width: 100%; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center; box-sizing: border-box; transition: all 0.4s ease;
        }
        .no-blur { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background: rgba(20, 26, 43, 0.95) !important; }
        h2 { margin: 0 0 5px 0; color: #fff; font-size: var(--title-size); }
        .subtitle { color: #94a3b8; margin: 0 0 35px 0; font-size: var(--sub-size); }
        .btn-container { display: flex; flex-direction: column; gap: 15px; }
        .discord-btn {
            color: white; padding: 16px 20px; border-radius: 12px; font-size: var(--btn-size); 
            font-weight: bold; text-decoration: none; display: flex; align-items: center; 
            justify-content: center; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); 
            border: 1px solid transparent;
        }
        .discord-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        #closedCard { display: none; }
    </style>
</head>
<body>

    <div class="settings-bar" :مغلق:="">
        <a id="btn1" target="_blank" class="discord-btn" style="background-color: #22c55e;">مغلق حاليا
            (Admin)</a>
        
    </div>

    

    <div class="glass-card" id="closedCard" style="display: none;">
        <h2 id="closeTitle" style="color: #ef4444;">🔒 الصفحة مغلقة حالياً</h2>
        <p id="closeSub" class="subtitle" style="margin-bottom: 0;">نعتذر منك، تم إيقاف استقبال الطلبات حالياً.</p>
    </div>

<script>
    let isBlur = true;
    let currentLang = 'ar';

    window.onload = function() {
        if(localStorage.getItem('pageStatus') === 'closed') {
            document.getElementById('clientCard').style.display = 'none';
            document.getElementById('closedCard').style.display = 'block';
        } else {
            document.getElementById('clientCard').style.display = 'block';
            document.getElementById('closedCard').style.display = 'none';
        }

        // تحميل وتطبيق تعديلات الـ 5 أزرار بالكامل من الأدمن
        for(let i=1; i<=5; i++) {
            if(localStorage.getItem('txt_btn'+i)) document.getElementById('btn'+i).innerText = localStorage.getItem('txt_btn'+i);
            if(localStorage.getItem('lnk_btn'+i)) document.getElementById('btn'+i).href = localStorage.getItem('lnk_btn'+i);
            if(localStorage.getItem('clr_btn'+i)) document.getElementById('btn'+i).style.backgroundColor = localStorage.getItem('clr_btn'+i);
            if(localStorage.getItem('vis_btn'+i) === 'none') document.getElementById('btn'+i).style.display = 'none';
        }

        if(localStorage.getItem('txt_docTitle')) document.getElementById('docTitle').innerText = localStorage.getItem('txt_docTitle');
        if(localStorage.getItem('txt_mainTitle')) document.getElementById('mainTitle').innerText = localStorage.getItem('txt_mainTitle');
        if(localStorage.getItem('txt_mainSubtitle')) document.getElementById('mainSubtitle').innerText = localStorage.getItem('txt_mainSubtitle');
        if(localStorage.getItem('txt_closeTitle')) document.getElementById('closeTitle').innerText = localStorage.getItem('txt_closeTitle');
        if(localStorage.getItem('txt_closeSub')) document.getElementById('closeSub').innerText = localStorage.getItem('txt_closeSub');

        const r = document.documentElement.style;
        if(localStorage.getItem('clr_primary')) r.setProperty('--primary', localStorage.getItem('clr_primary'));
        if(localStorage.getItem('clr_glassBg')) r.setProperty('--glass-bg', localStorage.getItem('clr_glassBg'));
        if(localStorage.getItem('clr_glassBorder')) r.setProperty('--glass-border', localStorage.getItem('clr_glassBorder'));
        if(localStorage.getItem('clr_textColor')) r.setProperty('--text-color', localStorage.getItem('clr_textColor'));
        if(localStorage.getItem('clr_grad1')) r.setProperty('--bg-grad-1', localStorage.getItem('clr_grad1'));
        if(localStorage.getItem('clr_grad2')) r.setProperty('--bg-grad-2', localStorage.getItem('clr_grad2'));
        if(localStorage.getItem('clr_grad3')) r.setProperty('--bg-grad-3', localStorage.getItem('clr_grad3'));
        if(localStorage.getItem('fnt_title')) r.setProperty('--title-size', localStorage.getItem('fnt_title') + 'rem');
        if(localStorage.getItem('fnt_sub')) r.setProperty('--sub-size', localStorage.getItem('fnt_sub') + 'rem');
        if(localStorage.getItem('fnt_btn')) r.setProperty('--btn-size', localStorage.getItem('fnt_btn') + 'rem');
    };

    function toggleBlur() {
        const btn = document.getElementById('blurToggle');
        isBlur = !isBlur;
        document.getElementById('clientCard').classList.toggle('no-blur', !isBlur);
        document.getElementById('closedCard').classList.toggle('no-blur', !isBlur);
        btn.innerText = isBlur ? (currentLang === 'ar' ? "✨ البلور: مفعّل" : "✨ Blur: ON") : (currentLang === 'ar' ? "✨ البلور: إيقاف" : "✨ Blur: OFF");
    }

    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('langToggle').innerText = currentLang === 'ar' ? "🌐 اللغة: العربية" : "🌐 Language: English";
        document.getElementById('blurToggle').innerText = isBlur ? (currentLang === 'ar' ? "✨ البلور: مفعّل" : "✨ Blur: ON") : (currentLang === 'ar' ? "✨ البلور: إيقاف" : "✨ Blur: OFF");
    }
</script>


</body></html>
