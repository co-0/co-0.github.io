<!DOCTYPE html>
<!-- saved from url=(0083)file:///C:/Users/s/Desktop/%D9%85%D9%88%D9%82%D8%B9%20%D8%A7%D9%84%D8%A8%D8%AB.html -->
<html lang="ar" dir="rtl"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> تم نقل الموقع</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* لمنع التمرير خلف النافذة */
        }
        .header-container {
            width: 100%;
            max-width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(30, 58, 138, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            opacity: 0.3; /* جعل الخلفية باهتة لتركيز الانتباه على النافذة */
        }
        .left-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .adblock-link {
            background-color: #dc2626;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }
        .server-note {
            text-align: center;
            margin-bottom: 15px;
            color: #93c5fd;
            font-size: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            opacity: 0.3;
        }
        
        /* تصميم النافذة المنبثقة الجميلة (Popup Modal) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .modal-box {
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
        }
        
        .modal-desc {
            font-size: 15px;
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* تصميم زر الانتقال الأنيق لفتح صفحة ثانية */
        .yacine-go-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
            transition: all 0.2s ease-in-out;
        }
        
        .yacine-go-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.6);
        }
    </style>
</head>
<body>

    <div class="server-note">"سيتم توقيف البث المباشر بعد انتهاء المباريات ب 30 دقيقه بسبب توفير الوقت للسيرفر"</div>

    <div class="header-container">
        <h1 style="font-size: 18px; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">📺 قناة البث الرئيسية</h1>
        <div class="left-buttons">
            <a href="https://getadblock.com/" target="_blank" class="adblock-link">🛡️ تحميل AdBlock</a>
        </div>
    </div>

    <!-- النافذة المنبثقة الجميلة التي تظهر فور دخول الموقع -->
    <div class="modal-overlay">
        <div class="modal-box">
            <span class="modal-icon">⚡</span>
            <div class="modal-title">تم تغير موقع السيرفر </div>
            <div class="modal-desc"></div>
            
            <!-- target="_blank" يضمن فتح الرابط في صفحة ثانية جديدة بالكامل -->
            <a href="https://royalrb.vercel.app/" target="_blank" class="yacine-go-btn">اضغط هنا للتوجه الى موقعنا الجديد</a>
        </div>
    </div>



</body></html>
